<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>在宅メンバー業務まとめ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/encoding-japanese@2.2.0/encoding.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<style>
:root {
  --g-blue: #4285F4;
  --g-red: #EA4335;
  --g-yellow: #FBBC04;
  --g-green: #34A853;
  --g-blue-dark: #1a73e8;
  --g-gray-100: #f8f9fa;
  --g-gray-200: #e8eaed;
  --g-gray-300: #dadce0;
  --g-gray-500: #5f6368;
  --g-gray-700: #3c4043;
  --g-gray-900: #202124;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans JP', 'Roboto', sans-serif;
  background: var(--g-gray-100);
  color: var(--g-gray-900);
  padding: 24px;
  min-height: 100vh;
}
.container { max-width: 1200px; margin: 0 auto; }

header {
  background: #ffffff;
  color: var(--g-gray-900);
  padding: 28px 32px;
  border-radius: 12px;
  margin-bottom: 24px;
  box-shadow: 0 1px 3px rgba(60,64,67,0.08), 0 1px 2px rgba(60,64,67,0.04);
  border-top: 4px solid var(--g-blue);
  position: relative;
  overflow: hidden;
}
header::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--g-blue) 0% 25%, var(--g-red) 25% 50%, var(--g-yellow) 50% 75%, var(--g-green) 75% 100%);
}
header h1 { font-size: 26px; font-weight: 500; margin-bottom: 6px; color: var(--g-gray-900); letter-spacing: -0.01em; }
header p { font-size: 14px; color: var(--g-gray-500); }

.upload-zone {
  display: block;
  background: white;
  border: 2px dashed var(--g-gray-300);
  border-radius: 12px;
  padding: 48px 24px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 24px;
  box-shadow: 0 1px 2px rgba(60,64,67,0.04);
}
.upload-zone:hover, .upload-zone.drag-over {
  border-color: var(--g-blue);
  background: #e8f0fe;
}
.upload-zone.has-file {
  padding: 20px 24px;
  border: 1px solid var(--g-green);
  background: #e6f4ea;
}
.upload-icon { font-size: 44px; margin-bottom: 12px; }
.upload-text { font-size: 15px; color: var(--g-gray-700); }
.upload-sub { font-size: 13px; color: var(--g-gray-500); margin-top: 6px; }
input[type="file"] { display: none; }

.summary {
  display: grid;
  grid-template-columns: 1fr;
  gap: 16px;
  margin-bottom: 24px;
}
.summary-card {
  background: white;
  padding: 24px 28px;
  border-radius: 12px;
  box-shadow: 0 1px 2px rgba(60,64,67,0.04);
  border-left: 4px solid var(--g-blue);
}
.summary-card .label { font-size: 13px; color: var(--g-gray-500); margin-bottom: 6px; font-weight: 500; }
.summary-card .value { font-size: 24px; font-weight: 500; color: var(--g-gray-900); letter-spacing: -0.01em; }
.summary-card .unit { font-size: 14px; color: var(--g-gray-500); margin-left: 4px; font-weight: 400; }

.card {
  background: white;
  padding: 24px 28px;
  border-radius: 12px;
  box-shadow: 0 1px 2px rgba(60,64,67,0.04);
  margin-bottom: 20px;
}
.card h2 {
  font-size: 16px;
  font-weight: 500;
  margin-bottom: 20px;
  color: var(--g-gray-900);
  padding-bottom: 12px;
  border-bottom: 1px solid var(--g-gray-200);
  letter-spacing: -0.01em;
}

.chart-wrap { position: relative; height: 340px; }

table.ranking {
  width: 100%;
  border-collapse: collapse;
}
table.ranking th, table.ranking td {
  padding: 14px 12px;
  text-align: left;
  border-bottom: 1px solid var(--g-gray-200);
}
table.ranking th {
  font-size: 12px;
  color: var(--g-gray-500);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
table.ranking td { font-size: 14px; color: var(--g-gray-700); }
table.ranking th.num, table.ranking td.num { text-align: right; }
table.ranking td.num { font-variant-numeric: tabular-nums; font-weight: 500; color: var(--g-gray-900); }

.hidden { display: none; }

.footer {
  text-align: center;
  color: var(--g-gray-500);
  font-size: 12px;
  margin-top: 32px;
  padding: 16px;
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>📊 在宅メンバー業務まとめ</h1>
    <p>kintone出力CSVを読み込むと、稼働時間と業務割合を自動集計します</p>
  </header>

  <label class="upload-zone" id="uploadZone">
    <div class="upload-icon">📁</div>
    <div class="upload-text"><strong>CSVファイルをドラッグ＆ドロップ</strong> または クリックして選択</div>
    <div class="upload-sub">kintone「MEO事務／勤怠登録」のエクスポートCSVに対応</div>
    <input type="file" id="fileInput" accept=".csv">
  </label>

  <div id="dashboard" class="hidden">
    <div class="summary" id="summary"></div>

    <div class="card">
      <h2>メンバー別・業務内訳</h2>
      <div class="chart-wrap" style="height:420px;"><canvas id="stackChart"></canvas></div>
    </div>

    <div class="card">
      <h2>📝 投稿効率（1件あたりの所要時間）</h2>
      <table class="ranking" id="efficiencyTable">
        <thead>
          <tr>
            <th>メンバー</th>
            <th class="num">効率（分/件）</th>
            <th class="num">投稿時間(h)</th>
            <th class="num">投稿店舗数</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <div class="footer">株式会社Ace / zaitaku-matome v1.7</div>
</div>

<script>
Chart.register(ChartDataLabels);

// Google公式カラーをベースに拡張
// コアカテゴリ：色とスタック順序を固定
const CATEGORY_ORDER = ['投稿','中村さん投稿','投稿チェック','サイテーション','インサイト','強化','初回対応','写真対応','口コミ対応','SEO','HP','その他'];
const CATEGORY_COLORS = {
  '投稿':         '#EA4335', // 赤
  '中村さん投稿':  '#C62828', // 暗赤（投稿系の派生）
  '投稿チェック':  '#F48FB1', // ピンク
  'サイテーション': '#FF9800', // オレンジ
  'インサイト':    '#F9A825', // 濃ゴールド
  '強化':         '#9C27B0', // 紫
  '初回対応':     '#34A853', // 緑
  '写真対応':     '#FFD54F', // 山吹
  '口コミ対応':   '#FFE082', // 淡ゴールド
  'SEO':         '#4285F4', // 青
  'HP':          '#4DD0E1', // 水色
  'その他':       '#9E9E9E'  // 灰色
};

const uploadZone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');

uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });

function handleFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const buffer = new Uint8Array(e.target.result);
    // 文字コード自動判定（Shift-JIS / UTF-8 対応）
    const detected = Encoding.detect(buffer);
    const text = Encoding.convert(buffer, { to: 'UNICODE', from: detected, type: 'string' });
    parseCSV(text, file.name);
  };
  reader.readAsArrayBuffer(file);
  uploadZone.classList.add('has-file');
  uploadZone.querySelector('.upload-text').innerHTML = `<strong>✅ ${file.name}</strong> 読込完了`;
}

function parseCSV(text, filename) {
  const parsed = Papa.parse(text, { header: true, skipEmptyLines: true });
  const allRows = parsed.data.filter(r => r['日付'] && r['名前']);
  if (allRows.length === 0) {
    alert('CSVに有効な行が見つかりません。ヘッダー列（日付/名前/稼働時間/業務内容）を確認してください。');
    return;
  }
  // 前日1日のみに絞り込み
  const rows = filterPreviousDay(allRows);
  if (rows.length === 0) {
    alert('前日のデータがCSVに含まれていません。エクスポート対象期間を確認してください。');
    return;
  }
  // 全期間に出てきた在宅メンバー一覧（前日に稼働していない人も棒グラフに表示するため）
  const allMembers = [...new Set(allRows.map(r => r['名前']).filter(Boolean))];
  analyze(rows, allMembers);
  document.getElementById('dashboard').classList.remove('hidden');
}

function filterPreviousDay(allRows) {
  // 今日より前の最新日付を「前日」として抽出
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const dateSet = new Set(allRows.map(r => r['日付']));
  const dates = [...dateSet].map(d => ({ raw: d, ts: parseDate(d).getTime() }))
    .filter(d => d.ts < today.getTime())
    .sort((a, b) => b.ts - a.ts);
  if (dates.length === 0) return [];
  const targetDate = dates[0].raw;
  window.__targetDate = targetDate;
  return allRows.filter(r => r['日付'] === targetDate);
}

function parseDate(s) {
  // "2026/04/20" 形式をDate化
  const [y, m, d] = s.split(/[\/\-]/).map(Number);
  return new Date(y, m - 1, d);
}

function parseContent(content) {
  // 業務内容を ■カテゴリ名 時間 ... の塊に分割し、各カテゴリの時間と配下の店舗数を抽出
  // 表記ゆれ対策：
  //   - 全角ｈ／全角数字／全角スペースをNFKCで半角化
  //   - 同レコード内に ■ がある場合 ◎は内訳（サブ）扱い、 ■がない場合 ◎もトップレベル扱い
  //   - 単位は h / hr / hrs / hour / 時間 / 時 を許容（大文字小文字無視）
  //   - 「投稿6h」のようなカテゴリ名と時間が連結したケースも救済
  //   - 「・」「-」「*」始まりはサブカテゴリ見出し → 時間も件数もカウントしない
  if (!content) return [];
  const normalized = content.normalize('NFKC');
  const lines = normalized.split(/\r?\n/);

  // 同レコード内に ■ があるかで ◎ の扱いを切り替える（流派対応）
  const MAIN = /^[■□▪▫◾◽]\uFE0F?\s*/;
  const hasMain = lines.some(l => MAIN.test(l.trim()));
  const TOP_MARKER = hasMain ? MAIN : /^[■□▪▫◾◽◆◇●○◎◯★☆]\uFE0F?\s*/;
  const SUB_MARKER = hasMain ? /^[・\-\*◎◯◆◇●○★☆]/ : /^[・\-\*]/;

  const NAME_HOURS = /^(.+?)[\s　]*([0-9]+(?:\.[0-9]+)?)\s*(?:h|hr|hrs|hour|時間|時)?\s*$/i;
  const ONLY_HOUR  = /^([0-9]+(?:\.[0-9]+)?)\s*(?:h|hr|hrs|hour|時間|時)\s*$/i;

  const cats = [];
  let current = null;

  for (const raw of lines) {
    const line = raw.trim();
    if (!line) continue;

    if (TOP_MARKER.test(line)) {
      if (current) cats.push(current);
      const body = line.replace(TOP_MARKER, '');
      const m = body.match(NAME_HOURS);
      if (m) {
        current = { name: normalizeCat(m[1]), hours: parseFloat(m[2]) || 0, items: [] };
      } else {
        current = { name: normalizeCat(body), hours: 0, items: [] };
      }
    } else if (current) {
      // サブカテゴリ見出しは時間も件数もカウントしない
      if (SUB_MARKER.test(line)) continue;
      // 「N h」だけの行は時間として救済
      const oh = line.match(ONLY_HOUR);
      if (oh && current.hours === 0) {
        current.hours = parseFloat(oh[1]);
        continue;
      }
      current.items.push(line);
    }
  }
  if (current) cats.push(current);
  return cats;
}

function normalizeCat(name) {
  // コア11カテゴリ：投稿／中村さん投稿／投稿チェック／サイテーション／インサイト／強化／初回対応／写真対応／口コミ対応／SEO／HP
  // それ以外はすべて「その他」に集約
  let n = name.normalize('NFKC').replace(/[（(].*$/, '').trim();
  // 末尾の「N h」「Nh」「N」を保険で除去（パース失敗時の救済）
  n = n.replace(/[\s　]*[0-9]+(?:\.[0-9]+)?[\s　]*h?\s*$/i, '').trim();
  n = n.replace(/[\s　]+h$/i, '').trim();
  if (!n) return 'その他';
  // 中村さん投稿は「投稿」より先に判定
  if (/^中村さん投稿/.test(n)) return '中村さん投稿';
  // モノ系 → 通常カテゴリへ統合
  if (n === 'モノ投稿') return '投稿';
  if (n === 'モノ投稿チェック' || n === 'モノ投稿修正') return '投稿チェック';
  // 投稿系
  if (n === '投稿修正' || n === '投稿チェック') return '投稿チェック';
  if (n === '投稿') return '投稿';
  // 初回
  if (n === '初回対応' || n === '初回') return '初回対応';
  // 口コミ（口コミ返信、口コミ返信チェック等を統合）
  if (/^口コミ/.test(n)) return '口コミ対応';
  // 写真（写真追加 → 写真対応）
  if (n === '写真対応' || n === '写真追加') return '写真対応';
  // 強化（強化案件含む）
  if (/^強化/.test(n)) return '強化';
  // インサイト（インサイト4月2回目等含む）
  if (/^インサイト/.test(n)) return 'インサイト';
  // サイテーション
  if (/^サイテーション/.test(n)) return 'サイテーション';
  // SEO/HP
  if (/^seo$/i.test(n)) return 'SEO';
  if (/^hp$/i.test(n)) return 'HP';
  // 上記以外はすべて「その他」
  return 'その他';
}

function analyze(rows, allMembers) {
  // メンバー別集計、カテゴリ別集計、投稿効率
  const memberTotals = {};
  const catTotals = {};
  const memberCatTable = {}; // member -> {cat: hours}
  const postingStats = {}; // member -> {hours, storeCount}
  const dates = new Set();

  // 全期間のメンバーを0で初期化（前日に稼働なしの人も棒グラフに出す）
  (allMembers || []).forEach(m => {
    memberTotals[m] = 0;
    memberCatTable[m] = {};
    postingStats[m] = { hours: 0, storeCount: 0 };
  });

  rows.forEach(r => {
    const name = r['名前'];
    const hours = parseFloat(r['稼働時間']) || 0;
    dates.add(r['日付']);
    memberTotals[name] = (memberTotals[name] || 0) + hours;

    const cats = parseContent(r['業務内容'] || '');
    memberCatTable[name] = memberCatTable[name] || {};
    postingStats[name] = postingStats[name] || { hours: 0, storeCount: 0 };

    cats.forEach(c => {
      catTotals[c.name] = (catTotals[c.name] || 0) + c.hours;
      memberCatTable[name][c.name] = (memberCatTable[name][c.name] || 0) + c.hours;
      if (c.name === '投稿') {
        postingStats[name].hours += c.hours;
        postingStats[name].storeCount += c.items.length;
      }
    });
  });

  renderSummary(rows);
  renderStackChart(memberCatTable, memberTotals);
  renderEfficiencyTable(postingStats);
}

function renderSummary(rows) {
  const targetDate = window.__targetDate || rows[0]['日付'];
  document.getElementById('summary').innerHTML = `
    <div class="summary-card"><div class="label">集計日（前日）</div><div class="value" style="font-size:22px;">${targetDate}</div></div>
  `;
}

let charts = {};

function renderStackChart(memberCatTable, memberTotals) {
  // メンバーを稼働時間が多い順にソート（稼働なしの人も末尾に表示）
  const members = Object.keys(memberCatTable).sort((a, b) => (memberTotals[b] || 0) - (memberTotals[a] || 0));
  // 苗字のみ表示。稼働ゼロのメンバーは「(稼働なし)」を改行で添える
  const labels = members.map(m => (memberTotals[m] || 0) === 0 ? [shortName(m), '(稼働なし)'] : shortName(m));

  // カテゴリは固定順序、ただし全員0のカテゴリはグラフから除外（凡例も出さない）
  const datasets = CATEGORY_ORDER
    .map(c => ({
      label: c,
      data: members.map(m => memberCatTable[m][c] || 0),
      backgroundColor: CATEGORY_COLORS[c] || '#cccccc',
      borderRadius: 4
    }))
    .filter(ds => ds.data.some(v => v > 0));

  if (charts.stack) charts.stack.destroy();
  charts.stack = new Chart(document.getElementById('stackChart'), {
    type: 'bar',
    data: { labels, datasets },
    options: {
      maintainAspectRatio: false,
      plugins: {
        legend: { position: 'bottom' },
        datalabels: {
          color: '#fff',
          font: { weight: 'bold', size: 10 },
          formatter: v => v >= 1 ? v.toFixed(1) : ''
        }
      },
      scales: { x: { stacked: true, grid: { display: false } }, y: { stacked: true, beginAtZero: true, grid: { color: '#edf2f7' } } }
    }
  });
}

function renderEfficiencyTable(stats) {
  // 投稿店舗数が1件以上のメンバーだけ、投稿時間÷件数で「1件あたりの分数」を算出
  const rows = Object.entries(stats)
    .filter(([_, s]) => s.storeCount > 0 && s.hours > 0)
    .map(([name, s]) => ({
      name,
      hours: s.hours,
      count: s.storeCount,
      minutesPerItem: (s.hours * 60) / s.storeCount
    }))
    // 効率の良い順（分/件が小さい順）にソート
    .sort((a, b) => a.minutesPerItem - b.minutesPerItem);
  const tbody = document.querySelector('#efficiencyTable tbody');
  tbody.innerHTML = rows.map((r, i) => `
    <tr class="rank-${i + 1}">
      <td>${shortName(r.name)}</td>
      <td class="num">${r.minutesPerItem.toFixed(1)}</td>
      <td class="num">${r.hours.toFixed(1)}</td>
      <td class="num">${r.count}</td>
    </tr>
  `).join('');
}

// 苗字のみ抽出（漢字2文字を苗字とする簡易ルール）
function shortName(fullName) {
  if (!fullName) return '';
  // スペース区切りがあれば最初の塊を返す
  const sp = fullName.split(/[\s　]+/);
  if (sp.length > 1) return sp[0];
  // それ以外は最初の2文字
  return fullName.slice(0, 2);
}
</script>
</body>
