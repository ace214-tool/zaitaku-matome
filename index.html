<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>在宅メンバー業務まとめ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/encoding-japanese@2.2.0/encoding.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
:root {
  --g-blue: #4285F4;
  --g-red: #EA4335;
  --g-yellow: #FBBC04;
  --g-green: #34A853;
  --g-blue-dark: #1a73e8;
  --g-gray-100: #f8f9fa;
  --g-gray-200: #e8eaed;
  --g-gray-300: #dadce0;
  --g-gray-500: #5f6368;
  --g-gray-700: #3c4043;
  --g-gray-900: #202124;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans JP', 'Roboto', sans-serif;
  background: var(--g-gray-100);
  color: var(--g-gray-900);
  padding: 24px;
  min-height: 100vh;
}
.container { max-width: 1200px; margin: 0 auto; }
@media (min-width: 1400px) { .container { max-width: 1320px; } }
@media (min-width: 1800px) { .container { max-width: 1500px; } }

header {
  background: #ffffff;
  color: var(--g-gray-900);
  padding: 28px 32px;
  border-radius: 12px;
  margin-bottom: 24px;
  box-shadow: 0 1px 3px rgba(60,64,67,0.08), 0 1px 2px rgba(60,64,67,0.04);
  border-top: 4px solid var(--g-blue);
  position: relative;
  overflow: hidden;
}
header::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--g-blue) 0% 25%, var(--g-red) 25% 50%, var(--g-yellow) 50% 75%, var(--g-green) 75% 100%);
}
header h1 { font-size: 26px; font-weight: 500; margin-bottom: 6px; color: var(--g-gray-900); letter-spacing: -0.01em; }
header p { font-size: 14px; color: var(--g-gray-500); }

.upload-zone {
  display: block;
  background: white;
  border: 2px dashed var(--g-gray-300);
  border-radius: 12px;
  padding: 48px 24px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 24px;
  box-shadow: 0 1px 2px rgba(60,64,67,0.04);
}
.upload-zone:hover, .upload-zone.drag-over {
  border-color: var(--g-blue);
  background: #e8f0fe;
}
.upload-zone.has-file {
  padding: 20px 24px;
  border: 1px solid var(--g-green);
  background: #e6f4ea;
}
.upload-icon { font-size: 44px; margin-bottom: 12px; }
.upload-text { font-size: 15px; color: var(--g-gray-700); }
.upload-sub { font-size: 13px; color: var(--g-gray-500); margin-top: 6px; }
input[type="file"] { display: none; }

.summary {
  display: grid;
  grid-template-columns: 1fr;
  gap: 16px;
  margin-bottom: 24px;
}
.summary-card {
  background: white;
  padding: 24px 28px;
  border-radius: 12px;
  box-shadow: 0 1px 2px rgba(60,64,67,0.04);
  border-left: 4px solid var(--g-blue);
}
.summary-card .label { font-size: 13px; color: var(--g-gray-500); margin-bottom: 6px; font-weight: 500; }
.summary-card .value { font-size: 24px; font-weight: 500; color: var(--g-gray-900); letter-spacing: -0.01em; }
.summary-card .unit { font-size: 14px; color: var(--g-gray-500); margin-left: 4px; font-weight: 400; }
.date-select {
  font-family: inherit;
  font-size: 22px;
  font-weight: 500;
  color: var(--g-gray-900);
  background: #fff;
  border: 1px solid var(--g-gray-300);
  border-radius: 8px;
  padding: 6px 36px 6px 12px;
  cursor: pointer;
  letter-spacing: -0.01em;
  appearance: none;
  -webkit-appearance: none;
  background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%235f6368' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
  background-repeat: no-repeat;
  background-position: right 12px center;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.date-select:hover { border-color: var(--g-blue); }
.date-select:focus { outline: none; border-color: var(--g-blue); box-shadow: 0 0 0 3px rgba(66,133,244,0.15); }

.card {
  background: white;
  padding: 24px 28px;
  border-radius: 12px;
  box-shadow: 0 1px 2px rgba(60,64,67,0.04);
  margin-bottom: 20px;
}
.card h2 {
  font-size: 16px;
  font-weight: 500;
  margin-bottom: 20px;
  color: var(--g-gray-900);
  padding-bottom: 12px;
  border-bottom: 1px solid var(--g-gray-200);
  letter-spacing: -0.01em;
}
.card-note {
  font-size: 13px;
  color: var(--g-gray-700);
  background: #fef7e0;
  padding: 10px 14px;
  border-radius: 8px;
  margin-bottom: 16px;
  border-left: 3px solid #FBBC04;
  line-height: 1.6;
}

.chart-wrap { position: relative; height: 340px; }
/* 画面が広いほどグラフを高くする（大画面で文字を読みやすく） */
@media (min-width: 1200px) { .chart-wrap-stack { height: 500px !important; } }
@media (min-width: 1600px) { .chart-wrap-stack { height: 580px !important; } }

table.ranking {
  width: 100%;
  border-collapse: collapse;
}
table.ranking th, table.ranking td {
  padding: 14px 12px;
  text-align: left;
  border-bottom: 1px solid var(--g-gray-200);
}
table.ranking th {
  font-size: 12px;
  color: var(--g-gray-500);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
table.ranking td { font-size: 14px; color: var(--g-gray-700); }
table.ranking th.num, table.ranking td.num { text-align: right; }
table.ranking td.num { font-variant-numeric: tabular-nums; font-weight: 500; color: var(--g-gray-900); }

.hidden { display: none; }

/* スクショアクションボタン */
.screenshot-bar {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin: 24px 0 16px;
}
.screenshot-btn {
  background: var(--g-blue);
  color: #fff;
  border: none;
  padding: 14px 28px;
  font-size: 15px;
  font-weight: 500;
  font-family: inherit;
  border-radius: 24px;
  cursor: pointer;
  box-shadow: 0 1px 3px rgba(60,64,67,0.16), 0 1px 2px rgba(60,64,67,0.08);
  transition: all 0.2s;
}
.screenshot-btn:hover { background: var(--g-blue-dark); box-shadow: 0 2px 6px rgba(60,64,67,0.2); }
.screenshot-btn:disabled { background: var(--g-gray-300); cursor: not-allowed; }
.screenshot-btn.success { background: var(--g-green); }
.screenshot-btn.error { background: var(--g-red); }

.footer {
  text-align: center;
  color: var(--g-gray-500);
  font-size: 12px;
  margin-top: 32px;
  padding: 16px;
}
</style>
</head>
<body>
<div class="container">
  <!-- ↓↓↓ スクショ対象エリア ↓↓↓ -->
  <div id="screenshotArea">
    <header>
      <h1>📊 在宅メンバー業務まとめ</h1>
      <p>みなさん、おはようございます！<br>本日もよろしくお願いいたします！！</p>
    </header>

    <div id="dashboard" class="hidden">
      <div class="summary" id="summary"></div>

      <div class="card">
        <h2>メンバー別・業務内訳</h2>
        <div class="chart-wrap chart-wrap-stack" style="height:420px;"><canvas id="stackChart"></canvas></div>
      </div>

      <div class="card">
        <h2>📝 投稿効率（1件あたりの所要時間）</h2>
        <p class="card-note">💡 内容に間違いがないことを前提に、<strong>平均6〜8分／件</strong> を目安にめざしてみてください！</p>
        <table class="ranking" id="efficiencyTable">
          <thead>
            <tr>
              <th>メンバー</th>
              <th class="num">効率（分/件）</th>
              <th class="num">投稿時間(h)</th>
              <th class="num">投稿店舗数</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>
  <!-- ↑↑↑ スクショ対象エリアここまで ↑↑↑ -->

  <!-- スクショボタン（スクショ対象外） -->
  <div id="screenshotBar" class="screenshot-bar hidden">
    <button class="screenshot-btn" id="screenshotBtn">📸 スクショをコピー</button>
  </div>

  <!-- CSV読み込みゾーン（スクショ対象外） -->
  <label class="upload-zone" id="uploadZone">
    <div class="upload-icon">📁</div>
    <div class="upload-text"><strong>CSVファイルをドラッグ＆ドロップ</strong> または クリックして選択</div>
    <div class="upload-sub">kintone「MEO事務／勤怠登録」のエクスポートCSVに対応</div>
    <input type="file" id="fileInput" accept=".csv">
  </label>

  <div class="footer">株式会社Ace / zaitaku-matome v2.9</div>
</div>

<script>
Chart.register(ChartDataLabels);

// Google公式カラーをベースに拡張
// コアカテゴリ：色とスタック順序を固定
const CATEGORY_ORDER = ['投稿','投稿チェック','サイテーション','インサイト','強化','初回対応','写真対応','口コミ対応','SEO','HP','その他'];
const CATEGORY_COLORS = {
  '投稿':         '#EA4335', // 赤
  '投稿チェック':  '#F48FB1', // ピンク
  'サイテーション': '#FF9800', // オレンジ
  'インサイト':    '#F9A825', // 濃ゴールド
  '強化':         '#9C27B0', // 紫
  '初回対応':     '#34A853', // 緑
  '写真対応':     '#FFD54F', // 山吹
  '口コミ対応':   '#FFE082', // 淡ゴールド
  'SEO':         '#4285F4', // 青
  'HP':          '#4DD0E1', // 水色
  'その他':       '#9E9E9E'  // 灰色
};

// 在宅メンバー固定リスト（CSVに該当データがなくても全員棒グラフに表示する）
// 並び順は「稼働時間が同点だった場合のタイブレーク順」を兼ねる
const FIXED_MEMBERS = ['江口','赤間','増田','服部','板東'];

const uploadZone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');

uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });

function handleFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const buffer = new Uint8Array(e.target.result);
    // 文字コード自動判定（Shift-JIS / UTF-8 対応）
    const detected = Encoding.detect(buffer);
    const text = Encoding.convert(buffer, { to: 'UNICODE', from: detected, type: 'string' });
    parseCSV(text, file.name);
  };
  reader.readAsArrayBuffer(file);
  uploadZone.classList.add('has-file');
  uploadZone.querySelector('.upload-text').innerHTML = `<strong>✅ ${file.name}</strong> 読込完了`;
}

function parseCSV(text, filename) {
  const parsed = Papa.parse(text, { header: true, skipEmptyLines: true });
  const allRows = parsed.data.filter(r => r['日付'] && r['名前']);
  if (allRows.length === 0) {
    alert('CSVに有効な行が見つかりません。ヘッダー列（日付/名前/稼働時間/業務内容）を確認してください。');
    return;
  }
  // グローバル保存（日付切替で再集計するため）
  window.__allRows = allRows;
  // FIXED_MEMBERSの苗字に該当するCSV内の氏名を採用、無ければ苗字そのものをキー化
  // （CSVに登場しない江口・増田なども必ず5名分の枠を確保するため）
  const csvMembers = [...new Set(allRows.map(r => r['名前']).filter(Boolean))];
  const surnameMap = {};
  csvMembers.forEach(n => {
    const s = shortName(n);
    if (FIXED_MEMBERS.includes(s) && !surnameMap[s]) surnameMap[s] = n;
  });
  window.__allMembers = FIXED_MEMBERS.map(s => surnameMap[s] || s);
  // デフォルト日付：前営業日（today未満で最新）
  const defaultDate = pickPreviousBusinessDay(allRows);
  if (!defaultDate) {
    alert('前日のデータがCSVに含まれていません。エクスポート対象期間を確認してください。');
    return;
  }
  window.__defaultDate = defaultDate;
  reanalyze(defaultDate);
  document.getElementById('dashboard').classList.remove('hidden');
  document.getElementById('screenshotBar').classList.remove('hidden');
}

function pickPreviousBusinessDay(allRows) {
  // 今日より前の最新日付を「前営業日」として抽出
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const dates = [...new Set(allRows.map(r => r['日付']))]
    .map(d => ({ raw: d, ts: parseDate(d).getTime() }))
    .filter(d => d.ts < today.getTime())
    .sort((a, b) => b.ts - a.ts);
  return dates.length > 0 ? dates[0].raw : null;
}

function reanalyze(targetDate) {
  // 集計日を切り替えて再集計
  window.__targetDate = targetDate;
  const rows = window.__allRows.filter(r => r['日付'] === targetDate);
  analyze(rows, window.__allMembers);
}

function parseDate(s) {
  // "2026/04/20" 形式をDate化
  const [y, m, d] = s.split(/[\/\-]/).map(Number);
  return new Date(y, m - 1, d);
}

function parseContent(content) {
  // 業務内容を ■カテゴリ名 時間 ... の塊に分割し、各カテゴリの時間と配下の店舗数を抽出
  // 表記ゆれ対策：
  //   - 全角ｈ／全角数字／全角スペースをNFKCで半角化
  //   - 同レコード内に ■ がある場合 ◎は内訳（サブ）扱い、 ■がない場合 ◎もトップレベル扱い
  //   - 単位は h / hr / hrs / hour / 時間 / 時 を許容（大文字小文字無視）
  //   - 「投稿6h」のようなカテゴリ名と時間が連結したケースも救済
  //   - 「・」「-」「*」始まりはサブカテゴリ見出し → 時間も件数もカウントしない
  if (!content) return [];
  const normalized = content.normalize('NFKC');
  const lines = normalized.split(/\r?\n/);

  // 同レコード内に ■ があるかで ◎ の扱いを切り替える（流派対応）
  const MAIN = /^[■□▪▫◾◽]\uFE0F?\s*/;
  const hasMain = lines.some(l => MAIN.test(l.trim()));
  const TOP_MARKER = hasMain ? MAIN : /^[■□▪▫◾◽◆◇●○◎◯★☆]\uFE0F?\s*/;
  const SUB_MARKER = hasMain ? /^[・\-\*◎◯◆◇●○★☆]/ : /^[・\-\*]/;

  const NAME_HOURS = /^(.+?)[\s　]*([0-9]+(?:\.[0-9]+)?)\s*(?:h|hr|hrs|hour|時間|時)?\s*$/i;
  const ONLY_HOUR  = /^([0-9]+(?:\.[0-9]+)?)\s*(?:h|hr|hrs|hour|時間|時)\s*$/i;

  const cats = [];
  let current = null;

  for (const raw of lines) {
    const line = raw.trim();
    if (!line) continue;

    if (TOP_MARKER.test(line)) {
      if (current) cats.push(current);
      const body = line.replace(TOP_MARKER, '');
      const m = body.match(NAME_HOURS);
      if (m) {
        current = { name: normalizeCat(m[1]), hours: parseFloat(m[2]) || 0, items: [] };
      } else {
        current = { name: normalizeCat(body), hours: 0, items: [] };
      }
    } else if (current) {
      // サブカテゴリ見出しは時間も件数もカウントしない
      if (SUB_MARKER.test(line)) continue;
      // 「N h」だけの行は時間として救済
      const oh = line.match(ONLY_HOUR);
      if (oh && current.hours === 0) {
        current.hours = parseFloat(oh[1]);
        continue;
      }
      current.items.push(line);
    }
  }
  if (current) cats.push(current);
  return cats;
}

function normalizeCat(name) {
  // コア11カテゴリ：投稿／中村さん投稿／投稿チェック／サイテーション／インサイト／強化／初回対応／写真対応／口コミ対応／SEO／HP
  // それ以外はすべて「その他」に集約
  let n = name.normalize('NFKC').replace(/[（(].*$/, '').trim();
  // 末尾の「N h」「Nh」「N」を保険で除去（パース失敗時の救済）
  n = n.replace(/[\s　]*[0-9]+(?:\.[0-9]+)?[\s　]*h?\s*$/i, '').trim();
  n = n.replace(/[\s　]+h$/i, '').trim();
  if (!n) return 'その他';
  // 中村さん投稿も投稿として統合
  if (/^中村さん投稿/.test(n)) return '投稿';
  // モノ系 → 通常カテゴリへ統合
  if (n === 'モノ投稿') return '投稿';
  if (n === 'モノ投稿チェック' || n === 'モノ投稿修正') return '投稿チェック';
  // 投稿系
  if (n === '投稿修正' || n === '投稿チェック') return '投稿チェック';
  if (n === '投稿') return '投稿';
  // 初回
  if (n === '初回対応' || n === '初回') return '初回対応';
  // 口コミ（口コミ返信、口コミ返信チェック等を統合）
  if (/^口コミ/.test(n)) return '口コミ対応';
  // 写真（写真追加 → 写真対応）
  if (n === '写真対応' || n === '写真追加') return '写真対応';
  // 強化（強化案件含む）
  if (/^強化/.test(n)) return '強化';
  // インサイト（インサイト4月2回目等含む）
  if (/^インサイト/.test(n)) return 'インサイト';
  // サイテーション
  if (/^サイテーション/.test(n)) return 'サイテーション';
  // SEO/HP
  if (/^seo$/i.test(n)) return 'SEO';
  if (/^hp$/i.test(n)) return 'HP';
  // 上記以外はすべて「その他」
  return 'その他';
}

function analyze(rows, allMembers) {
  // メンバー別集計、カテゴリ別集計、投稿効率
  const memberTotals = {};
  const catTotals = {};
  const memberCatTable = {}; // member -> {cat: hours}
  const postingStats = {}; // member -> {hours, storeCount}
  const dates = new Set();

  // 全期間のメンバーを0で初期化（前日に稼働なしの人も棒グラフに出す）
  (allMembers || []).forEach(m => {
    memberTotals[m] = 0;
    memberCatTable[m] = {};
    postingStats[m] = { hours: 0, storeCount: 0 };
  });

  rows.forEach(r => {
    const name = r['名前'];
    // FIXED_MEMBERS外のメンバーは集計対象外（5名固定）
    if (!FIXED_MEMBERS.includes(shortName(name))) return;
    const hours = parseFloat(r['稼働時間']) || 0;
    dates.add(r['日付']);
    memberTotals[name] = (memberTotals[name] || 0) + hours;

    const cats = parseContent(r['業務内容'] || '');
    memberCatTable[name] = memberCatTable[name] || {};
    postingStats[name] = postingStats[name] || { hours: 0, storeCount: 0 };

    cats.forEach(c => {
      catTotals[c.name] = (catTotals[c.name] || 0) + c.hours;
      memberCatTable[name][c.name] = (memberCatTable[name][c.name] || 0) + c.hours;
      if (c.name === '投稿') {
        postingStats[name].hours += c.hours;
        postingStats[name].storeCount += c.items.length;
      }
    });
  });

  renderSummary(rows);
  renderStackChart(memberCatTable, memberTotals);
  renderEfficiencyTable(postingStats);
}

function renderSummary(rows) {
  const targetDate = window.__targetDate || (rows[0] && rows[0]['日付']);
  const allRows = window.__allRows || [];
  const defaultDate = window.__defaultDate;
  // 全期間の日付一覧（新しい順）
  const dates = [...new Set(allRows.map(r => r['日付']))]
    .map(d => ({ raw: d, ts: parseDate(d).getTime() }))
    .sort((a, b) => b.ts - a.ts);
  const options = dates.map(d => {
    const isDefault = d.raw === defaultDate;
    const sel = d.raw === targetDate ? ' selected' : '';
    const label = isDefault ? `${d.raw}（前営業日）` : d.raw;
    return `<option value="${d.raw}"${sel}>${label}</option>`;
  }).join('');
  document.getElementById('summary').innerHTML = `
    <div class="summary-card">
      <div class="label">集計日</div>
      <select id="dateSelect" class="date-select">${options}</select>
    </div>
  `;
  document.getElementById('dateSelect').addEventListener('change', e => {
    reanalyze(e.target.value);
  });
}

let charts = {};

function renderStackChart(memberCatTable, memberTotals) {
  // 稼働時間の長い順（降順）。同点時はFIXED_MEMBERSの記載順をタイブレークに使用
  const members = Object.keys(memberCatTable).sort((a, b) => {
    const diff = (memberTotals[b] || 0) - (memberTotals[a] || 0);
    if (diff !== 0) return diff;
    return FIXED_MEMBERS.indexOf(shortName(a)) - FIXED_MEMBERS.indexOf(shortName(b));
  });
  // 苗字のみ表示。稼働ゼロのメンバーは「(稼働なし)」を改行で添える
  const labels = members.map(m => (memberTotals[m] || 0) === 0 ? [shortName(m), '(稼働なし)'] : shortName(m));

  // カテゴリは固定順序、ただし全員0のカテゴリはグラフから除外（凡例も出さない）
  const datasets = CATEGORY_ORDER
    .map(c => ({
      label: c,
      data: members.map(m => memberCatTable[m][c] || 0),
      backgroundColor: CATEGORY_COLORS[c] || '#cccccc',
      borderRadius: 4
    }))
    .filter(ds => ds.data.some(v => v > 0));

  if (charts.stack) charts.stack.destroy();
  charts.stack = new Chart(document.getElementById('stackChart'), {
    type: 'bar',
    data: { labels, datasets },
    options: {
      maintainAspectRatio: false,
      plugins: {
        legend: {
          position: 'bottom',
          labels: {
            padding: 14,
            usePointStyle: true,
            pointStyle: 'rect',
            boxWidth: 14,
            boxHeight: 14,
            font: ctx => ({ size: getResponsiveFontSize(ctx.chart, 'legend') })
          }
        },
        datalabels: {
          // 白文字＋黒縁取りでどの背景色でも視認性確保
          color: '#fff',
          textStrokeColor: '#000',
          textStrokeWidth: ctx => Math.max(3, Math.round(getResponsiveFontSize(ctx.chart, 'data') / 5)),
          font: ctx => ({
            family: "'Noto Sans JP', sans-serif",
            weight: '700',
            size: getResponsiveFontSize(ctx.chart, 'data')
          }),
          textAlign: 'center',
          formatter: (v, ctx) => {
            if (v < 0.5) return '';                              // 0.5h未満は表示しない
            if (v < 1.5) return v.toFixed(1) + 'h';              // 0.5〜1.5hは時間のみ
            return [ctx.dataset.label, v.toFixed(1) + 'h'];      // 1.5h以上は項目名+時間
          }
        }
      },
      scales: {
        x: {
          stacked: true,
          grid: { display: false },
          ticks: { font: ctx => ({ size: getResponsiveFontSize(ctx.chart, 'axis') }) }
        },
        y: {
          stacked: true,
          beginAtZero: true,
          grid: { color: '#edf2f7' },
          ticks: { font: ctx => ({ size: getResponsiveFontSize(ctx.chart, 'axis') }) }
        }
      }
    }
  });
}

// グラフ幅に応じてフォントサイズを返す（小さい画面は12px、大きい画面は最大18-20px）
function getResponsiveFontSize(chart, type) {
  const width = chart.width || 800;
  // 800px基準で12px、1600pxで上限に到達するイメージ
  const ratio = Math.min(Math.max(width / 800, 1), 2);
  if (type === 'data') return Math.round(12 * ratio); // 12 → 24px
  if (type === 'legend') return Math.round(12 * Math.min(ratio, 1.4)); // 12 → 17px
  if (type === 'axis') return Math.round(11 * Math.min(ratio, 1.5)); // 11 → 16px
  return 12;
}

function renderEfficiencyTable(stats) {
  // 投稿店舗数が1件以上のメンバーだけ、投稿時間÷件数で「1件あたりの分数」を算出
  const rows = Object.entries(stats)
    .filter(([_, s]) => s.storeCount > 0 && s.hours > 0)
    .map(([name, s]) => ({
      name,
      hours: s.hours,
      count: s.storeCount,
      minutesPerItem: (s.hours * 60) / s.storeCount
    }))
    // 効率の良い順（分/件が小さい順）にソート
    .sort((a, b) => a.minutesPerItem - b.minutesPerItem);
  const tbody = document.querySelector('#efficiencyTable tbody');
  tbody.innerHTML = rows.map((r, i) => `
    <tr class="rank-${i + 1}">
      <td>${shortName(r.name)}</td>
      <td class="num">${r.minutesPerItem.toFixed(1)}</td>
      <td class="num">${r.hours.toFixed(1)}</td>
      <td class="num">${r.count}</td>
    </tr>
  `).join('');
}

// 苗字のみ抽出（漢字2文字を苗字とする簡易ルール）
function shortName(fullName) {
  if (!fullName) return '';
  // スペース区切りがあれば最初の塊を返す
  const sp = fullName.split(/[\s　]+/);
  if (sp.length > 1) return sp[0];
  // それ以外は最初の2文字
  return fullName.slice(0, 2);
}

// スクショ機能：ボタンクリックでクリップボードコピー（失敗時はダウンロード）
document.getElementById('screenshotBtn').addEventListener('click', async () => {
  const btn = document.getElementById('screenshotBtn');
  const target = document.getElementById('screenshotArea');
  const originalText = btn.textContent;
  btn.disabled = true;
  btn.textContent = '⏳ 生成中...';
  btn.classList.remove('success', 'error');
  try {
    const canvas = await html2canvas(target, {
      scale: 2,                  // 高解像度（Retina対応）
      backgroundColor: '#f8f9fa', // body背景色
      useCORS: true,
      logging: false
    });
    const dateStr = (window.__targetDate || new Date().toISOString().slice(0, 10)).replace(/\//g, '-');
    // クリップボード対応ブラウザならコピー優先
    if (navigator.clipboard && window.ClipboardItem) {
      canvas.toBlob(async blob => {
        try {
          await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
          btn.textContent = '✅ コピーしました！チャットに貼り付けてください';
          btn.classList.add('success');
        } catch (err) {
          // コピー失敗時はダウンロードにフォールバック
          downloadCanvas(canvas, dateStr);
          btn.textContent = '✅ ダウンロードしました';
          btn.classList.add('success');
        }
        setTimeout(() => { btn.textContent = originalText; btn.classList.remove('success'); btn.disabled = false; }, 4000);
      }, 'image/png');
    } else {
      // ClipboardItem非対応ブラウザ：ダウンロードのみ
      downloadCanvas(canvas, dateStr);
      btn.textContent = '✅ ダウンロードしました';
      btn.classList.add('success');
      setTimeout(() => { btn.textContent = originalText; btn.classList.remove('success'); btn.disabled = false; }, 4000);
    }
  } catch (err) {
    btn.textContent = '❌ エラー：' + (err.message || 'スクショに失敗しました');
    btn.classList.add('error');
    setTimeout(() => { btn.textContent = originalText; btn.classList.remove('error'); btn.disabled = false; }, 4000);
  }
});

function downloadCanvas(canvas, dateStr) {
  const link = document.createElement('a');
  link.download = `zaitaku-matome-${dateStr}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}
